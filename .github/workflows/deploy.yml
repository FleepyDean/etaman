  notify-deployment:
    runs-on: ubuntu-latest
    needs: [deploy-to-heroku]
    if: always()
    
    steps:
    - name: Notify on Slack
      if: always()
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "eTaman Deployment ${{ needs.deploy-to-heroku.result == 'success' && '✅ Success' || '❌ Failed' }}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*eTaman Deployment*\nStatus: ${{ needs.deploy-to-heroku.result == 'success' && '✅ Success' || '❌ Failed' }}\nCommit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\nAuthor: ${{ github.actor }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
